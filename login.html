<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - My Automotive Blog</title>
    <link rel="stylesheet" href="common.css?v=1.1">
    <link rel="stylesheet" href="admin.css?v=1.1">
</head>
<body class="login-page-body">

    <div class="login-card">
        <h2>Admin Login</h2>
        <p>데이터베이스 관리를 위해 로그인하세요.</p>
        
        <div class="login-input-group">
            <label for="admin-id">Username</label>
            <input type="text" id="admin-id" placeholder="ID를 입력하세요">
        </div>
        
        <div class="login-input-group">
            <label for="admin-pw">Password</label>
            <input type="password" id="admin-pw" placeholder="비밀번호를 입력하세요">
        </div>
        
        <div class="login-input-group">
            <label for="github-token">GitHub Token</label>
            <input type="password" id="github-token" placeholder="ghp_로 시작하는 토큰을 입력하세요">
        </div>

        <p id="error-text" style="display: none; color: #ff4d4d; font-size: 0.8rem; margin-bottom: 15px;">
            아이디 또는 비밀번호가 일치하지 않습니다.
        </p>

        <button type="button" id="btn-login" class="btn-login">로그인</button>
        <a href="index.html" class="back-to-main">← 메인 페이지로 돌아가기</a>
    </div>

    <script src="login.js?v=1.1"></script>
</body>
</html>
