<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Database Admin | Blog Management</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="admin.css">
    <script src="auth.js"></script>
</head>
<body class="admin-page">
    <header class="admin-header">
        <div class="header-container">
            <h1>Database Admin</h1>
            <div class="header-tools">
                <button id="btn-open-modal" class="btn-new">+ 새로 만들기</button>
                <button onclick="logout()" class="btn-logout">로그아웃</button>
            </div>
        </div>
    </header>

    <main class="admin-main">
        <section class="database-view">
            <table class="notion-table">
                <thead>
                    <tr>
                        <th>Aa 자동차 이름</th>
                        <th># 연식</th>
                        <th>▽ 브랜드</th>
                        <th>▽ 형식</th>
                        <th>▽ 연료 종류</th>
                        <th>▽ 크기</th>
                        <th># 가격</th>
                    </tr>
                </thead>
                <tbody id="db-body">
                    </tbody>
            </table>
        </section>
    </main>

    <div id="modal-container" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>새 자동차 정보 입력</h3>
                <p>구글 폼으로 전송 전 데이터를 확인하세요.</p>
            </div>
            
            <form id="car-form">
                <div class="form-row">
                    <label>자동차 이름</label>
                    <input type="text" id="name" placeholder="예: Santa Fe" required>
                </div>
                <div class="form-row">
                    <label>연식</label>
                    <input type="number" id="year" placeholder="예: 2025" required>
                </div>
                <div class="form-row">
                    <label>브랜드</label>
                    <select id="brand">
                        <optgroup label="국산차">
                            <option value="Hyundai">현대(Hyundai)</option>
                            <option value="Kia">기아(Kia)</option>
                            <option value="Genesis">제네시스(Genesis)</option>
                            <option value="KG Mobility">KGM(쌍용)</option>
                            <option value="Renault Korea">르노코리아</option>
                        </optgroup>
                        <optgroup label="수입차">
                            <option value="Tesla">테슬라(Tesla)</option>
                            <option value="BMW">BMW</option>
                            <option value="Mercedes-Benz">벤츠(Mercedes-Benz)</option>
                            <option value="Audi">아우디(Audi)</option>
                            <option value="Porsche">포르쉐(Porsche)</option>
                            <option value="Volvo">볼보(Volvo)</option>
                        </optgroup>
                    </select>
                </div>

                <div class="form-row">
                    <label>연료 종류</label>
                    <select id="fuel">
                        <option value="Gasoline">가솔린(휘발유)</option>
                        <option value="Diesel">디젤(경유)</option>
                        <option value="Hybrid">하이브리드(HEV)</option>
                        <option value="PHEV">플러그인 하이브리드</option>
                        <option value="Electric">전기(BEV)</option>
                        <option value="LPG">LPG</option>
                        <option value="Hydrogen">수소(FCEV)</option>
                    </select>
                </div>

                <div class="form-row">
                    <label>크기</label>
                    <select id="size">
                        <option value="Micro">경차</option>
                        <option value="Subcompact">소형</option>
                        <option value="Compact">준중형</option>
                        <option value="Mid-size">중형</option>
                        <option value="Full-size">준대형</option>
                        <option value="Luxury">대형</option>
                    </select>
                </div>
                <div class="form-row">
                    <label>차량 가격</label>
                    <input type="text" id="price" placeholder="금액을 입력하세요" oninput="formatPrice(this)">
                </div>
                
                <div class="modal-footer">
                    <button type="button" id="btn-cancel" class="btn-secondary">취소</button>
                    <button type="button" id="btn-next" class="btn-primary">데이터 전송(구글 폼)</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="admin.js"></script>
</body>
</html>
