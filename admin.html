<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Database Admin | Blog Management</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="admin.css">
    <script src="auth.js"></script>
</head>
<body class="admin-page">
    <header class="admin-header">
        <div class="header-container">
            <h1>Car-Log Database Administration</h1>
            <div class="header-tools">
                <button onclick="logout()" class="btn-logout-link">로그아웃</button>
            </div>
        </div>
    </header>

    <main class="admin-main">
        <div class="main-actions">
            <button id="btn-open-modal" class="btn-new-sky">+ 새 자동차 추가하기</button>
        </div>

        <section class="database-view">
            <table class="notion-table">
                <thead>
                    <tr>
                        <th>Aa 자동차 이름</th>
                        <th># 연식</th>
                        <th>▽ 브랜드</th>
                        <th>▽ 형식</th>
                        <th>▽ 연료 종류</th>
                        <th>▽ 크기</th>
                        <th># 가격</th>
                        <th>🗺️ 체험 경로</th>
                        <th>📅 등록일</th>
                        <th>⚙️ 관리</th>
                    </tr>
                </thead>
                <tbody id="db-body"></tbody>
            </table>
            <div id="pagination-controls" class="pagination"></div>
        </section>
    </main>

    <div id="modal-container" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>자동차 정보 입력</h3>
            </div>
            
            <form id="car-form">
                <div class="form-grid">
                    <div class="form-row">
                        <label>자동차 이름</label>
                        <input type="text" id="name" placeholder="예: Tesla Model 3">
                    </div>
                    <div class="form-row">
                        <label>연식</label>
                        <input type="number" id="year" placeholder="2024">
                    </div>
                    <div class="form-row">
                        <label>브랜드</label>
                        <input type="text" id="brand" placeholder="Hyundai">
                    </div>
                    <div class="form-row">
                        <label>형식</label>
                        <select id="type">
                            <option value="Sedan">세단</option>
                            <option value="SUV">SUV</option>
                            <option value="Hatchback">해치백</option>
                            <option value="Coupe">쿠페</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <label>연료 종류</label>
                        <select id="fuel">
                            <option value="Gasoline">가솔린</option>
                            <option value="Electric">전기</option>
                            <option value="Hybrid">하이브리드</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <label>크기</label>
                        <select id="size">
                            <option value="Compact">준중형</option>
                            <option value="Mid-size">중형</option>
                            <option value="Full-size">준대형</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <label>가격</label>
                        <input type="text" id="price" oninput="formatPrice(this)">
                    </div>
                    <div class="form-row">
                        <label>체험 경로</label>
                        <select id="experience">
                            <option value="본인/가족 차량">본인/가족 차량</option>
                            <option value="제조사 시승">제조사 시승</option>
                            <option value="렌터카/카셰어링">렌터카/카셰어링</option>
                        </select>
                    </div>
                </div>
                
                <div class="modal-footer">
                    <button type="button" id="btn-cancel" class="btn-secondary">취소</button>
                    <button type="button" id="btn-next" class="btn-primary">저장</button>
                </div>
            </form>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
