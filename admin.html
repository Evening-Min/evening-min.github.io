<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Database Admin | Blog Management</title>
    <link rel="stylesheet" href="style.css">
    <script src="auth.js"></script>
</head>
<body class="admin-page">
    <header class="admin-header">
        <h1>Database Admin</h1>
        <div class="header-tools">
            <button id="btn-open-modal" class="btn-new">새로 만들기</button>
            <button onclick="logout()" class="btn-logout">로그아웃</button>
        </div>
    </header>

    <main class="admin-main">
        <section class="database-view">
            <table class="notion-table">
                <thead>
                    <tr>
                        <th>Aa 자동차 이름</th>
                        <th># 연식</th>
                        <th>▽ 브랜드</th>
                        <th>▽ 형식</th>
                        <th>▽ 연료 종류</th>
                        <th>▽ 크기</th>
                        <th># 가격</th>
                    </tr>
                </thead>
                <tbody id="db-body">
                    </tbody>
            </table>
        </section>
    </main>

    <div id="modal-container" class="modal">
        <div class="modal-content">
            <h3>새 자동차 정보 입력</h3>
            <form id="car-form">
                <div class="form-row"><label>이름</label><input type="text" id="name" placeholder="Santa Fe"></div>
                <div class="form-row"><label>연식</label><input type="number" id="year" placeholder="2025"></div>
                <div class="form-row"><label>브랜드</label><input type="text" id="brand" placeholder="Hyundai"></div>
                <div class="form-row">
                    <label>형식</label>
                    <select id="type">
                        <option value="SUV">SUV</option>
                        <option value="Sedan">Sedan</option>
                        <option value="Coupe">Coupe</option>
                    </select>
                </div>
                <div class="form-row"><label>연료</label><input type="text" id="fuel" placeholder="Gasoline"></div>
                <div class="form-row"><label>크기</label><input type="text" id="size" placeholder="중형"></div>
                <div class="form-row"><label>가격</label><input type="text" id="price" placeholder="49,900,000"></div>
                
                <div class="modal-footer">
                    <button type="button" id="btn-cancel" class="btn-secondary">취소</button>
                    <button type="button" id="btn-next" class="btn-primary">다음</button>
                </div>
            </form>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
