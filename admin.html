<!-- /*
 * Name: Youngmin Jeon
 * Date: April 14, 2024
 * Section: IAB 6068
 * This is html for the database administration page.
 * This page is only accessible to the administrator and allows them to manage the car database,
 * including adding new cars and viewing existing entries. The page includes a modal form for adding new cars,
 * a table to display the current database entries, and pagination controls for navigating through multiple pages of entries.
 * The administrator can also log out from this page, which will clear their authentication token and redirect them to the login page.
 */ -->

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Database Admin | Blog Management</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="admin.css">
    <script src="auth.js"></script>
</head>
<body class="admin-page">
    <header class="admin-header">
        <div class="header-container">
            <h1>Car-Log Database Administration</h1>
            <div class="header-tools">
                <button onclick="logout()" class="btn-logout-link">로그아웃</button>
            </div>
        </div>
    </header>

    <main class="admin-main">
        <nav class="admin-tab-nav">
            <button id="tab-car" class="tab-btn active">시승기 관리</button>
            <button id="tab-maint" class="tab-btn">정비 기록 관리</button>
        </nav>

        <div class="main-actions">
            <button id="btn-open-modal" class="btn-new-sky">+ 새 자동차 추가하기</button>
        </div>

        <section class="database-view">
            <table class="notion-table">
                <thead id="db-thead"></thead>
                <tbody id="db-body"></tbody>
            </table>
            <div id="pagination-controls" class="pagination"></div>
        </section>
    </main>

    <div id="modal-container" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>자동차 정보 입력</h3>
            </div>
            
            <form id="car-form">
                <div class="form-grid">
                    <div class="form-row">
                        <label>자동차 이름</label>
                        <input type="text" id="name" placeholder="예: Sonata">
                    </div>
                    <div class="form-row">
                        <label>연식</label>
                        <input type="number" id="year" placeholder="2024">
                    </div>
                    <div class="form-row">
                        <label>브랜드</label>
                        <select id="brand">
                            <optgroup label="국산차">
                                <option value="Hyundai">현대</option>
                                <option value="Kia">기아</option>
                                <option value="Genesis">제네시스</option>
                                <option value="Chevrolet">쉐보레</option>
                                <option value="KGM">KG 모빌리티</option>
                                <option value="Renault Korea">르노코리아</option>
                            </optgroup>
                            
                            <optgroup label="수입차">
                                <option value="Audi">아우디 (Audi)</option>
                                <option value="Alfa Romeo">알파로메오 (Alfa Romeo)</option>
                                <option value="BMW">BMW</option>
                                <option value="Ford">포드 (Ford)</option>
                                <option value="Jaguar">재규어 (Jaguar)</option>
                                <option value="Land Rover">랜드로버 (Land Rover)</option>
                                <option value="Mercedes-Benz">메르세데스-벤츠 (Mercedes-Benz)</option>
                                <option value="Porsche">포르쉐 (Porsche)</option>
                                <option value="Tesla">테슬라 (Tesla)</option>
                                <option value="Volkswagen">폭스바겐 (Volkswagen)</option>
                            </optgroup>
                        </select>
                    </div>
                    <div class="form-row">
                        <label>형식</label>
                        <select id="type">
                            <option value="Sedan">세단</option>
                            <option value="SUV">SUV</option>
                            <option value="Hatchback">해치백</option>
                            <option value="Wagon">왜건</option>
                            <option value="Minivan">미니밴</option>
                            <option value="Coupe">쿠페</option>
                            <option value="Convertible">컨버터블</option>
                            <option value="Truck">트럭</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <label>연료 종류</label>
                        <select id="fuel">
                            <option value="Gasoline">가솔린</option>
                            <option value="Diesel">디젤</option>
                            <option value="LPG">LPG</option>
                            <option value="Gasoline Hybrid">가솔린 하이브리드</option>
                            <option value="Plug-in Hybrid">플러그인 하이브리드</option>
                            <option value="Electric">전기</option>
                            <option value="EREV">EREV</option>
                            <option value="Hydrogen">수소</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <label>크기</label>
                        <select id="size">
                            <option value="Mini">경형</option>
                            <option value="Subcompact">소형</option>
                            <option value="Compact">준중형</option>
                            <option value="Mid-size">중형</option>
                            <option value="Full-size">준대형</option>
                            <option value="Large">대형</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <label>가격</label>
                        <input type="text" id="price" oninput="formatPrice(this)">
                    </div>
                    <div class="form-row">
                        <label>체험 경로</label>
                        <select id="experience">
                            <option value="본인/가족 차량">본인/가족 차량</option>
                            <option value="지인/친척 차량">지인/친척 차량</option>
                            <option value="소속 기관 차량">소속 기관 차량</option>
                            <option value="제조사 시승">제조사 시승</option>
                            <option value="렌터카/카셰어링">렌터카/카셰어링</option>
                            <option value="기타">기타</option>
                        </select>
                    </div>
                </div>
                
                <div class="modal-footer">
                    <button type="button" id="btn-cancel" class="btn-secondary">취소</button>
                    <button type="button" id="btn-next" class="btn-primary">저장</button>
                </div>
            </form>
        </div>
    </div>

    <div id="maintenance-modal-container" class="modal">
    <div class="modal-content" style="width: 600px;">
        <div class="modal-header">
            <h3>정비 기록 입력</h3>
        </div>
        <form id="maint-form">
            <div class="form-grid">
                <div class="form-row">
                    <label>분류</label>
                    <select id="maint-category">
                        <option value="oil">오일</option>
                        <option value="part">소모품</option>
                        <option value="wash">세차/외장</option>
                        <option value="repair">수리/교체</option>
                    </select>
                </div>
                <div class="form-row"><label>날짜</label><input type="date" id="maint-date"></div>
                <div class="form-row"><label>주행거리 (km)</label><input type="number" id="maint-mileage" placeholder="79400"></div>
                <div class="form-row"><label>비용 (₩)</label><input type="text" id="maint-cost" placeholder="55000" oninput="formatPrice(this)"></div>
                
                <div class="form-row" style="grid-column: 1 / -1;">
                    <label>정비 및 부품 내역</label>
                    <input type="text" id="maint-item" placeholder="예: 킥스 파오 100 5W30">
                </div>

                <div class="form-row" style="grid-column: 1 / -1;">
                    <label>만족도 별점</label>
                    <div class="star-rating" id="maint-star-container">
                        <span data-value="1">★</span>
                        <span data-value="2">★</span>
                        <span data-value="3">★</span>
                        <span data-value="4">★</span>
                        <span data-value="5">★</span>
                    </div>
                    <input type="hidden" id="maint-rating" value="0">
                </div>

                <div class="form-row" style="grid-column: 1 / -1;">
                    <label>나의 한 줄 리뷰</label>
                    <textarea id="maint-review" rows="3" placeholder="부품의 성능이나 사용 후기를 작성하세요."></textarea>
                </div>

                <div class="form-row" style="grid-column: 1 / -1;"><label>비고 (메모)</label><input type="text" id="maint-note" placeholder="자가 정비 여부 등"></div>
            </div>
            <div class="modal-footer">
                <button type="button" id="btn-maint-cancel" class="btn-secondary">취소</button>
                <button type="button" id="btn-maint-next" class="btn-primary">저장</button>
            </div>
        </form>
    </div>
</div>

    <script src="admin.js"></script>
</body>
</html>
