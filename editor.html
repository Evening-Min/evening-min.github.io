<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Editor | 시승기 작성</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="editor.css">
    <script src="auth.js"></script>
</head>
<body>
    <main class="editor-main">
        <div class="editor-container">
            <div class="target-car-badge">
                <span id="target-car-info">차량 정보를 불러오는 중...</span>
            </div>

            <section class="editor-meta">
                <input type="text" id="post-title" placeholder="시승기 제목을 입력하세요" class="input-title">
            </section>

            <section class="editor-assets">
                <div class="upload-control">
                    <button type="button" id="btn-add-image" class="btn-camera-round">
                        <span class="icon">📷</span> 이미지 추가
                    </button>
                    <input type="file" id="file-input" multiple accept="image/*" style="display: none;">
                    <span id="file-count">선택된 이미지 없음</span>
                </div>
            </section>

            <section class="editor-body">
                <textarea id="post-content" placeholder="차량에 대한 시승기를 자유롭게 작성해 보세요."></textarea>
            </section>

            <div class="editor-actions-center">
                <button id="btn-save-post" class="btn-primary-large">시승기 발행하기</button>
                <a href="admin.html" class="btn-back-link">취소하고 관리자로 돌아가기</a>
            </div>
        </div>
    </main>

    <script src="editor.js"></script>
</body>
</html>
